name: Build stats card

on:
  schedule:
    - cron: '41 2 * * *'      # 每天刷新统计数据
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: build-stats
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Generate stats.svg
        env:
          GH_TOKEN: ${{ github.token }}
          STATS_USER: ZerbLion
        run: node scripts/gen-stats.mjs

      - name: Commit if changed
        run: |
          if [ -n "$(git status --porcelain stats.svg)" ]; then
            git config user.name  "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add stats.svg
            git commit -m "chore: refresh stats card"
            git push
          else
            echo "stats.svg 无变化，跳过提交"
          fi
